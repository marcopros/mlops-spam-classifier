<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spam Classifier</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a; color: #e2e8f0;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 2rem;
    }
    .container { width: 100%; max-width: 560px; }
    h1 { font-size: 2rem; font-weight: 700; text-align: center; margin-bottom: 0.25rem; }
    h1 span { color: #38bdf8; }
    .subtitle { text-align: center; color: #94a3b8; font-size: 0.95rem; margin-bottom: 2rem; }
    .card {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 12px; padding: 2rem;
    }
    label {
      display: block; font-size: 0.85rem; font-weight: 600;
      color: #94a3b8; text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 0.5rem;
    }
    textarea {
      width: 100%; height: 120px; background: #0f172a;
      border: 1px solid #334155; border-radius: 8px;
      color: #e2e8f0; font-family: inherit; font-size: 1rem;
      padding: 0.75rem 1rem; resize: vertical; transition: border-color 0.2s;
    }
    textarea:focus { outline: none; border-color: #38bdf8; }
    button {
      width: 100%; margin-top: 1rem; padding: 0.75rem;
      background: #38bdf8; color: #0f172a; font-size: 1rem;
      font-weight: 700; border: none; border-radius: 8px;
      cursor: pointer; transition: background 0.2s;
    }
    button:hover { background: #7dd3fc; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .result { margin-top: 1.5rem; display: none; }
    .result.show { display: block; }
    .result-box {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.25rem; border-radius: 8px;
      font-weight: 600; font-size: 1.1rem;
    }
    .result-box.spam {
      background: rgba(239,68,68,0.15); border: 1px solid #ef4444; color: #fca5a5;
    }
    .result-box.ham {
      background: rgba(34,197,94,0.15); border: 1px solid #22c55e; color: #86efac;
    }
    .badge {
      font-size: 0.8rem; padding: 0.25rem 0.75rem;
      border-radius: 999px; font-weight: 700; text-transform: uppercase;
    }
    .spam .badge { background: #ef4444; color: #fff; }
    .ham .badge { background: #22c55e; color: #fff; }
    .prob { margin-top: 0.75rem; font-size: 0.85rem; color: #94a3b8; }
    .prob-bar {
      margin-top: 0.4rem; height: 6px; background: #334155;
      border-radius: 3px; overflow: hidden;
    }
    .prob-fill {
      height: 100%; border-radius: 3px; transition: width 0.4s ease;
    }
    .spam .prob-fill { background: #ef4444; }
    .ham .prob-fill { background: #22c55e; }
    .error-msg {
      margin-top: 1rem; padding: 0.75rem 1rem;
      background: rgba(239,68,68,0.15); border: 1px solid #ef4444;
      border-radius: 8px; color: #fca5a5; font-size: 0.9rem; display: none;
    }
    .examples { margin-top: 1.5rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .examples span {
      font-size: 0.75rem; font-weight: 600; color: #94a3b8;
      text-transform: uppercase; letter-spacing: 0.05em;
      width: 100%; margin-bottom: 0.15rem;
    }
    .example-btn {
      background: #0f172a; border: 1px solid #334155; border-radius: 6px;
      color: #94a3b8; padding: 0.4rem 0.75rem; font-size: 0.8rem;
      cursor: pointer; transition: border-color 0.2s, color 0.2s;
      width: auto; font-weight: 400; margin-top: 0;
    }
    .example-btn:hover { border-color: #38bdf8; color: #e2e8f0; }
    footer {
      margin-top: 2rem; font-size: 0.8rem; color: #475569; text-align: center;
    }
    footer a { color: #38bdf8; text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="container">
    <h1>&#x1f6e1; Spam <span>Classifier</span></h1>
    <p class="subtitle">Real-time spam detection powered by ML</p>
    <div class="card">
      <label for="msg">Message</label>
      <textarea id="msg" placeholder="Type or paste a message to classify..."></textarea>
      <div class="examples">
        <span>Try an example</span>
        <button class="example-btn" type="button" onclick="tryExample(this)">You won a free iPhone! Click now</button>
        <button class="example-btn" type="button" onclick="tryExample(this)">Hey, are we still meeting at 6pm?</button>
        <button class="example-btn" type="button" onclick="tryExample(this)">URGENT: Send bank details to claim prize</button>
      </div>
      <button id="btn" onclick="classify()">Classify</button>
      <div class="error-msg" id="error"></div>
      <div class="result" id="result">
        <div class="result-box" id="result-box">
          <span id="result-label"></span>
          <span class="badge" id="result-badge"></span>
        </div>
        <div class="prob">
          Spam probability: <strong id="prob-val"></strong>
          <div class="prob-bar"><div class="prob-fill" id="prob-fill"></div></div>
        </div>
      </div>
    </div>
    <footer>
      Built with FastAPI + scikit-learn &middot;
      <a href="/docs" target="_blank">API Docs</a>
    </footer>
  </div>
  <script>
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');
    const resultDiv = document.getElementById('result');
    const resultBox = document.getElementById('result-box');
    const resultLabel = document.getElementById('result-label');
    const resultBadge = document.getElementById('result-badge');
    const probVal = document.getElementById('prob-val');
    const probFill = document.getElementById('prob-fill');
    const errorDiv = document.getElementById('error');

    function tryExample(el) { msg.value = el.textContent; classify(); }

    async function classify() {
      const text = msg.value.trim();
      if (!text) return;
      btn.disabled = true; btn.textContent = 'Classifying...';
      errorDiv.style.display = 'none'; resultDiv.classList.remove('show');
      try {
        const res = await fetch('/predict', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text }),
        });
        if (!res.ok) { const err = await res.json(); throw new Error(err.detail || 'Request failed'); }
        const data = await res.json();
        const isSpam = data.prediction === 'spam';
        const pct = (data.spam_probability * 100).toFixed(1);
        resultBox.className = 'result-box ' + (isSpam ? 'spam' : 'ham');
        resultLabel.textContent = isSpam ? 'This looks like spam' : 'This looks legit';
        resultBadge.textContent = data.prediction;
        probVal.textContent = pct + '%';
        probFill.style.width = pct + '%';
        resultDiv.classList.add('show');
      } catch (e) { errorDiv.textContent = e.message; errorDiv.style.display = 'block'; }
      finally { btn.disabled = false; btn.textContent = 'Classify'; }
    }

    msg.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); classify(); }
    });
  </script>
</body>
</html>
