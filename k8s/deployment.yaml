apiVersion: apps/v1
kind: Deployment
metadata:
  name: spam-classifier
  labels:
    app: spam-classifier
spec:
  replicas: 2
  selector:
    matchLabels:
      app: spam-classifier
  template:
    metadata:
      labels:
        app: spam-classifier
    spec:
      containers:
        - name: spam-classifier
          image: ghcr.io/marcopros/mlops-spam-classifier:latest
          ports:
            - containerPort: 10000
          env:
            - name: MODEL_PATH
              value: "models/model_latest.joblib"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 10000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 10000
            initialDelaySeconds: 10
            periodSeconds: 30
